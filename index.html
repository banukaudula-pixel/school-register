<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Prefects Attendance</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --bg: #f0f7ff;
        --card: #ffffff;
        --text: #1e293b;
        --border: #e2e8f0;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, Arial, sans-serif;
    }

    body {
        background: var(--bg);
        padding: 20px;
        color: var(--text);
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
        background: var(--card);
        padding: 25px;
        border-radius: 16px;
    }

    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 2px solid #eee;
    }

    .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 12px;
        cursor: pointer;
        font-size: 16px;
        color: #666;
    }

    .tab-btn.active {
        color: #4caf50;
        border-bottom: 3px solid #4caf50;
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
    }

    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        background: white;
    }

    #generateBtn, #downloadBtn {
        width: 100%;
        background: #4caf50;
        color: white;
        margin-top: 10px;
    }

    #qrcode {
        margin: 20px auto;
        display: flex;
        justify-content: center;
    }

    #reader {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        border: 3px solid #4caf50;
    }

    .status {
        text-align: center;
        padding: 14px;
        margin: 15px 0;
        background: #e8f5e9;
        border-radius: 10px;
        color: #2e7d32;
        font-weight: 600;
    }

    .controls {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
    }

    .controls button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    #startBtn { background: #4caf50; color: white; }
    #stopBtn { background: #f44336; color: white; }
    #clearBtn { background: #ff9800; color: white; }

    .attendance-list {
        margin-top: 20px;
        border-top: 2px solid #eee;
        padding-top: 15px;
    }

    .attendance-item {
        padding: 12px;
        background: #f9f9f9;
        margin: 8px 0;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid #4caf50;
    }
</style>
</head>
<body>
<div class="container">
    <h1 style="text-align: center; margin-bottom: 20px; color: #333;">School Prefects Attendance</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scanner', this)">Scanner</button>
        <button class="tab-btn" onclick="switchTab('generator', this)">QR Generator</button>
    </div>

    <div id="scanner" class="tab-content active">
        <div id="reader"></div>
        <div class="status">
            <p id="statusText">Click 'Start Scanner' and allow camera permission</p>
        </div>
        <div class="controls">
            <button id="startBtn">Start Scanner</button>
            <button id="stopBtn" style="display:none;">Stop Scanner</button>
            <button id="clearBtn">Clear Local List</button>
        </div>
        <div class="attendance-list">
            <h3>Today's Attendance: <span id="count">0</span> students</h3>
            <div id="list"></div>
        </div>
    </div>

    <div id="generator" class="tab-content">
        <div class="form-group">
            <label>Registration Number (ඇතුළත් වීමේ අංකය)</label>
            <input type="text" id="regNo" placeholder="1234">
        </div>
        <div class="form-group">
            <label>Prefect's Name (සිසුවාගේ නම)</label>
            <input type="text" id="studentName" placeholder="Nishan Madushanka">
        </div>
        <div class="form-group">
            <label>Designation / Role (තනතුර)</label>
            <select id="designation">
                <option value="Prefect">Prefect (ශිෂ්‍ය නායක)</option>
                <option value="Senior Prefect">Senior Prefect</option>
                <option value="Deputy Head Prefect">Deputy Head Prefect</option>
                <option value="Head Prefect">Head Prefect</option>
                <option value="Student">Regular Student</option>
            </select>
        </div>
        <button id="generateBtn">Generate QR Code</button>
        <div id="qrcode"></div>
        <button id="downloadBtn" style="display:none;">Download QR Image</button>
    </div>
</div>

<script>
    // 🚨 මෙතනට ඔයාගේ GOOGLE WEB APP URL එක අනිවාර්යයෙන්ම දාන්න මල්ලි
    const googleWebAppURL = "https://script.google.com/macros/s/AKfycbxAHSJCEoSGZSpQpWz5FHz44zO6qRg0DY8XPCqZ4qwJW-8zHKdqpmgddYglt_JEt5LA/exec";

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusText = document.getElementById('statusText');
    const countSpan = document.getElementById('count');
    const listDiv = document.getElementById('list');

    let html5QrCode = null;
    let scannedToday = new Set();
    let today = new Date().toISOString().split('T')[0];
    let isProcessing = false; // Duplicate බ්ලොක් කරන ප්‍රධාන flag එක

    function loadData() {
        const saved = localStorage.getItem(`attendance_${today}`);
        if (saved) {
            const data = JSON.parse(saved);
            scannedToday = new Set(data.map(d => d.admissionNo));
            updateList(data);
        }
    }

    function updateList(data) {
        countSpan.textContent = data.length;
        listDiv.innerHTML = data.map(item => `
            <div class="attendance-item">
                <div>
                    <strong>${item.name}</strong> (${item.designation})<br>
                    <small style="color:#666;">ID: ${item.admissionNo}</small>
                </div>
                <span style="color:#4caf50; font-weight:bold;">${item.time}</span>
            </div>
        `).reverse().join('');
    }

    function onScanSuccess(decodedText) {
        // 1. දැනටමත් තව QR එකක් process වෙන ගමන් නම් අලුත් ස්කෑන් බ්ලොක් කරයි (Anti-spam)
        if (isProcessing) return;

        try {
            const parts = decodedText.split(',');
            if (parts.length < 3) {
                showStatus("⚠️ Invalid QR Format!", '#f44336', '#ffebee');
                return;
            }

            const admissionNo = parts[0].trim();
            const name = parts[1].trim();
            const designation = parts[2].trim();
            const time = new Date().toLocaleTimeString();

            // 2. Local Duplicate Check (දැනටමත් අද ලිස්ට් එකේ ඉන්නවා නම් බ්ලොක් කරයි)
            if (scannedToday.has(admissionNo)) {
                isProcessing = true; // තාවකාලිකව කැමරාව හෝල්ඩ් කරයි
                showStatus(`⚠️ ${name} දැනටමත් ඇතුළත් කර ඇත!`, '#ff9800', '#fff3e0');
                
                // තත්පර 3කින් පසු නැවත ස්කෑන් කිරීමට ඉඩ දෙයි
                setTimeout(() => { 
                    isProcessing = false; 
                    showStatus("Scanner active. Point at QR code", '#2e7d32', '#e8f5e9');
                }, 3000);
                return;
            }

            // දත්ත යැවීම ආරම්භ වන නිසා scanner එක lock කරයි
            isProcessing = true;
            showStatus("⏳ Sending data to Google Sheet...", '#00bcff', '#e0f7ff');

            // 3. Google Sheet එකට දත්ත යැවීම
            fetch(googleWebAppURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ regNo: admissionNo, name: name, designation: designation })
            })
            .then(() => {
                // සාර්ථකව ගිය පසු Local List එකට එකතු කිරීම
                scannedToday.add(admissionNo);
                const saved = localStorage.getItem(`attendance_${today}`);
                let data = saved ? JSON.parse(saved) : [];
                data.push({ admissionNo, name, designation, time });
                localStorage.setItem(`attendance_${today}`, JSON.stringify(data));
                updateList(data);
                
                showStatus(`✓ ${name} (${designation}) Attendance Marked!`, '#2e7d32', '#e8f5e9');
                if (navigator.vibrate) navigator.vibrate(100);

                // සාර්ථක ස්කෑන් එකකට පසු ඊළඟ ළමයා එනකම් තත්පර 3ක් කැමරාව නිශ්ක්‍රීයව තබයි
                setTimeout(() => { 
                    isProcessing = false; 
                    showStatus("Scanner active. Point at QR code", '#2e7d32', '#e8f5e9');
                }, 3000);
            })
            .catch(err => {
                showStatus("❌ Google Sheet Error!", '#f44336', '#ffebee');
                isProcessing = false; // Error එකක් වුණොත් නැවත ස්කෑන් කරන්න ඉඩ දෙයි
                console.error(err);
            });

        } catch (e) {
            showStatus("Error reading QR code", '#f44336', '#ffebee');
            isProcessing = false;
        }
    }

    function showStatus(msg, textColor, bgColor) {
        statusText.textContent = msg;
        statusText.parentElement.style.background = bgColor;
        statusText.parentElement.style.color = textColor;
    }

    startBtn.addEventListener('click', async () => {
        try {
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, () => {});
            startBtn.style.display = 'none'; stopBtn.style.display = 'inline-block';
            showStatus("Scanner active. Point at QR code", '#2e7d32', '#e8f5e9');
        } catch(err) { showStatus("Camera error: " + err.message, '#f44336', '#ffebee'); }
    });

    stopBtn.addEventListener('click', () => {
        if(html5QrCode) { html5QrCode.stop(); html5QrCode = null; }
        startBtn.style.display = 'inline-block'; stopBtn.style.display = 'none';
        showStatus("Scanner stopped", '#ff9800', '#fff3e0');
        isProcessing = false;
    });

    clearBtn.addEventListener('click', () => {
        if (confirm("Clear local screen list? (Sheet data will NOT be deleted)")) {
            localStorage.removeItem(`attendance_${today}`); scannedToday.clear(); updateList([]);
            showStatus("Local view cleared", '#ff9800', '#fff3e0');
        }
    });

    // --- GENERATOR LOGIC ---
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const qrcodeDiv = document.getElementById('qrcode');

    generateBtn.addEventListener('click', () => {
        const regNo = document.getElementById('regNo').value.trim();
        const name = document.getElementById('studentName').value.trim();
        const designation = document.getElementById('designation').value;

        if (!regNo || !name) {
            alert("Please enter both Registration Number and Name");
            return;
        }

        // දත්ත 3ම කමා (comma) වලින් වෙන් කර QR එකට දමයි
        const qrData = `${regNo},${name},${designation}`;
        qrcodeDiv.innerHTML = "";

        try {
            new QRCode(qrcodeDiv, {
                text: qrData, width: 250, height: 250,
                colorDark: "#000000", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            downloadBtn.style.display = 'block';
        } catch(e) {
            qrcodeDiv.innerHTML = '<p style="color:red;">Error generating QR.</p>';
        }
    });

    downloadBtn.addEventListener('click', () => {
        const canvas = qrcodeDiv.querySelector('canvas');
        const img = qrcodeDiv.querySelector('img');
        let dataUrl = canvas ? canvas.toDataURL('image/png') : (img ? img.src : '');
        if(dataUrl) {
            const a = document.createElement('a'); a.href = dataUrl;
            a.download = `${document.getElementById('regNo').value}_QR.png`;
            a.click();
        }
    });

    loadData();
</script>
</body>
</html>
