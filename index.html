<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Prefects Attendance System</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    :root {
        --primary: #1e40af;
        --primary-light: #3b82f6;
        --primary-accent: #eff6ff;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
        background: var(--bg);
        padding: 30px 15px;
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 650px;
        background: var(--card);
        padding: 35px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(30, 64, 175, 0.05);
        border: 1px solid var(--border);
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: var(--primary);
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 30px;
        background: var(--primary-accent);
        padding: 6px;
        border-radius: 14px;
    }

    .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 14px;
        cursor: pointer;
        font-size: 15px;
        color: var(--text-muted);
        font-weight: 700;
        border-radius: 10px;
        transition: all 0.25s ease;
    }

    .tab-btn.active {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2);
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
        animation: slideUp 0.35s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text);
        font-size: 14px;
    }

    .form-group input, .form-group select {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-size: 16px;
        background: white;
        color: var(--text);
        transition: all 0.2s ease;
    }

    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: var(--primary-light);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    button {
        padding: 14px 24px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        font-size: 15px;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    button:active {
        transform: scale(0.98);
    }

    #generateBtn, #downloadBtn {
        width: 100%;
        background: var(--primary);
        color: white;
        margin-top: 15px;
    }

    #generateBtn:hover, #downloadBtn:hover {
        background: #1d4ed8;
    }

    #downloadBtn {
        background: var(--success);
    }
    #downloadBtn:hover { background: #059669; }

    #qrcode {
        margin: 30px auto;
        display: flex;
        justify-content: center;
        padding: 20px;
        background: var(--bg);
        border-radius: 16px;
        border: 2px dashed var(--border);
        width: max-content;
    }

    #reader {
        width: 100%;
        border-radius: 18px;
        overflow: hidden;
        border: 3px solid var(--primary);
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    #reader video { border-radius: 14px; }
    #reader img { display: none !important; }

    .status-container {
        text-align: center;
        padding: 16px;
        margin: 20px 0;
        background: var(--primary-accent);
        border-radius: 14px;
        color: var(--primary);
        font-weight: 700;
        font-size: 15px;
        border-left: 5px solid var(--primary);
        transition: all 0.3s ease;
    }

    .controls {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 25px;
    }

    #startBtn { background: var(--primary); color: white; flex: 2; }
    #startBtn:hover { background: #1d4ed8; }
    #stopBtn { background: var(--danger); color: white; flex: 2; }
    #stopBtn:hover { background: #dc2626; }
    #clearBtn { background: var(--text-muted); color: white; flex: 1; }
    #clearBtn:hover { background: #475569; }

    .attendance-list {
        margin-top: 30px;
        border-top: 2px solid var(--border);
        padding-top: 20px;
    }

    .attendance-list h3 {
        font-size: 16px;
        color: var(--text-muted);
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
    }

    .attendance-item {
        padding: 16px;
        background: var(--bg);
        margin: 10px 0;
        border-radius: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid var(--primary-light);
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
    }

    .student-name {
        font-weight: 700;
        color: var(--text);
        font-size: 16px;
    }

    .student-role {
        font-size: 13px;
        color: var(--primary-light);
        font-weight: 600;
        background: var(--primary-accent);
        padding: 2px 8px;
        border-radius: 6px;
        margin-left: 5px;
    }

    .student-id {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 4px;
    }

    .scan-time {
        color: var(--text);
        font-weight: 700;
        font-size: 14px;
        background: #e2e8f0;
        padding: 6px 12px;
        border-radius: 8px;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Prefects Attendance Management</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scanner', this)">QR Scanner</button>
        <button class="tab-btn" onclick="switchTab('generator', this)">QR Generator</button>
    </div>

    <div id="scanner" class="tab-content active">
        <div id="reader"></div>
        <div class="status-container">
            <p id="statusText">Click 'Start Scanner' to begin</p>
        </div>
        <div class="controls">
            <button id="startBtn">Start Scanner</button>
            <button id="stopBtn" style="display:none;">Stop Scanner</button>
            <button id="clearBtn">Clear View</button>
        </div>
        <div class="attendance-list">
            <h3><span>Today's Log (Local View)</span> <span id="count" style="color:var(--primary); font-weight:800;">0</span></h3>
            <div id="list"></div>
        </div>
    </div>

    <div id="generator" class="tab-content">
        <div class="form-group">
            <label>Registration Number (ඇතුළත් වීමේ අංකය - Numbers Only)</label>
            <input type="text" id="regNo" placeholder="e.g. 1234" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>
        <div class="form-group">
            <label>Prefect's Name (සිසුවාගේ නම)</label>
            <input type="text" id="studentName" placeholder="e.g. Nishan Madushanka">
        </div>
        <div class="form-group">
            <label>Designation / Role (තනතුර)</label>
            <select id="designation">
                <option value="Prefect">Prefect (ශිෂ්‍ය නායක)</option>
                <option value="Senior Prefect">Senior Prefect</option>
                <option value="Deputy Head Prefect">Deputy Head Prefect</option>
                <option value="Head Prefect">Head Prefect</option>
                <option value="Student">Regular Student</option>
            </select>
        </div>
        <button id="generateBtn">Generate Smart QR</button>
        <div id="qrcode"></div>
        <button id="downloadBtn" style="display:none;">Download QR PNG</button>
    </div>
</div>

<script>
    const googleWebAppURL = "https://script.google.com/macros/s/AKfycbyeX47X9IuH3F3_zWyYJ5QYPSoAr6logawXTDTptS52opTZUAWuGVepy7uX5nNwvzZq/exec";
    const systemPassword = "1978@@ba";

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusText = document.getElementById('statusText');
    const countSpan = document.getElementById('count');
    const listDiv = document.getElementById('list');

    let html5QrCode = null;
    let scannedToday = new Set();
    let today = new Date().toISOString().split('T')[0];
    let isProcessing = false;

    function loadData() {
        const saved = localStorage.getItem(`attendance_${today}`);
        if (saved) {
            const data = JSON.parse(saved);
            scannedToday = new Set(data.map(d => d.admissionNo));
            updateList(data);
        }
    }

    function updateList(data) {
        countSpan.textContent = data.length;
        listDiv.innerHTML = data.map(item => `
            <div class="attendance-item">
                <div>
                    <span class="student-name">${item.name}</span>
                    <span class="student-role">${item.designation}</span>
                    <div class="student-id">ID: ${item.admissionNo}</div>
                </div>
                <span class="scan-time">${item.time}</span>
            </div>
        `).reverse().join('');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return;

        try {
            const parts = decodedText.split(',');
            if (parts.length < 3) {
                showStatus("⚠️ Invalid QR Format! Generate a new one.", '#dc2626', '#fee2e2', '#ef4444');
                return;
            }

            const admissionNo = parts[0].trim();
            const name = parts[1].trim();
            const designation = parts[2].trim();
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

            if (scannedToday.has(admissionNo)) {
                isProcessing = true;
                showStatus(`⚠️ ${name} is already marked!`, '#b45309', '#fef3c7', '#f59e0b');
                setTimeout(() => { 
                    isProcessing = false; 
                    showStatus("Scanner active. Point at QR code", '#1e40af', '#eff6ff', '#3b82f6');
                }, 3000);
                return;
            }

            isProcessing = true;
            showStatus("⏳ Uploading to Google Sheet...", '#1d4ed8', '#eff6ff', '#3b82f6');

            fetch(googleWebAppURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ regNo: admissionNo, name: name, designation: designation })
            })
            .then(() => {
                scannedToday.add(admissionNo);
                const saved = localStorage.getItem(`attendance_${today}`);
                let data = saved ? JSON.parse(saved) : [];
                data.push({ admissionNo, name, designation, time });
                localStorage.setItem(`attendance_${today}`, JSON.stringify(data));
                updateList(data);
                
                showStatus(`✓ ${name} Marked Successfully!`, '#047857', '#d1fae5', '#10b981');
                if (navigator.vibrate) navigator.vibrate(100);

                setTimeout(() => { 
                    isProcessing = false; 
                    showStatus("Scanner active. Point at QR code", '#1e40af', '#eff6ff', '#3b82f6');
                }, 3000);
            })
            .catch(err => {
                showStatus("❌ Google Sheet Sync Failed!", '#dc2626', '#fee2e2', '#ef4444');
                isProcessing = false;
                console.error(err);
            });

        } catch (e) {
            showStatus("Error processing code", '#dc2626', '#fee2e2', '#ef4444');
            isProcessing = false;
        }
    }

    function showStatus(msg, textColor, bgColor, borderColor) {
        statusText.textContent = msg;
        const container = statusText.parentElement;
        container.style.background = bgColor;
        container.style.color = textColor;
        container.style.borderColor = borderColor;
    }

    startBtn.addEventListener('click', async () => {
        try {
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, () => {});
            startBtn.style.display = 'none'; stopBtn.style.display = 'inline-block';
            showStatus("Scanner active. Point at QR code", '#1e40af', '#eff6ff', '#3b82f6');
        } catch(err) { showStatus("Camera error: " + err.message, '#dc2626', '#fee2e2', '#ef4444'); }
    });

    stopBtn.addEventListener('click', () => {
        if(html5QrCode) { html5QrCode.stop(); html5QrCode = null; }
        startBtn.style.display = 'inline-block'; stopBtn.style.display = 'none';
        showStatus("Scanner stopped", '#64748b', '#f1f5f9', '#cbd5e1');
        isProcessing = false;
    });

    clearBtn.addEventListener('click', () => {
        const passwordInput = prompt("Enter Admin Password to clear local logs:");
        if (passwordInput === null) return;
        
        if (passwordInput === systemPassword) {
            localStorage.removeItem(`attendance_${today}`); 
            scannedToday.clear(); 
            updateList([]);
            showStatus("Local logs cleared successfully", '#64748b', '#f1f5f9', '#cbd5e1');
        } else {
            alert("❌ Incorrect Password! Access Denied.");
        }
    });

    // --- GENERATOR ---
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const qrcodeDiv = document.getElementById('qrcode');

    generateBtn.addEventListener('click', () => {
        const regNo = document.getElementById('regNo').value.trim();
        const name = document.getElementById('studentName').value.trim();
        const designation = document.getElementById('designation').value;

        if (!regNo || !name) {
            alert("Please fill in all standard details!");
            return;
        }

        // 🚨 Integer/Numbers Only Validation (ඉලක්කම් විතරක්මද කියා චෙක් කිරීම)
        const numberRegex = /^[0-9]+$/;
        if (!numberRegex.test(regNo)) {
            alert("❌ Registration Number must contain NUMBERS ONLY!");
            return;
        }

        const passwordInput = prompt("Enter Admin Password to Generate QR Code:");
        if (passwordInput === null) return;

        if (passwordInput !== systemPassword) {
            alert("❌ Incorrect Password! Authorization Failed.");
            return;
        }

        const qrData = `${regNo},${name},${designation}`;
        qrcodeDiv.innerHTML = "";

        try {
            new QRCode(qrcodeDiv, {
                text: qrData, width: 220, height: 220,
                colorDark: "#0f172a", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            qrcodeDiv.style.borderStyle = "solid";
            downloadBtn.style.display = 'block';
        } catch(e) {
            qrcodeDiv.innerHTML = '<p style="color:var(--danger);">Error rendering QR.</p>';
        }
    });

    downloadBtn.addEventListener('click', () => {
        const canvas = qrcodeDiv.querySelector('canvas');
        const img = qrcodeDiv.querySelector('img');
        let dataUrl = canvas ? canvas.toDataURL('image/png') : (img ? img.src : '');
        if(dataUrl) {
            const a = document.createElement('a'); a.href = dataUrl;
            a.download = `${document.getElementById('regNo').value}_QR.png`;
            a.click();
        }
    });

    loadData();
</script>
</body>
</html>
